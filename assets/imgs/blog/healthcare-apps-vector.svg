<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="blog-bg" x1="0" y1="0" x2="800" y2="450" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1a1a2e"/>
      <stop offset="1" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="blog-accent" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0" stop-color="#c9f31d"/>
      <stop offset="1" stop-color="#a8d91a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#blog-bg)"/>
  <!-- Abstract device shape -->
  <rect x="280" y="60" width="240" height="330" rx="24" fill="#2c2c2c" stroke="url(#blog-accent)" stroke-width="2"/>
  <rect x="300" y="90" width="200" height="240" rx="8" fill="#1d1d1d"/>
  <!-- Signal bars -->
  <rect x="320" y="100" width="12" height="24" rx="2" fill="url(#blog-accent)"/>
  <rect x="338" y="106" width="12" height="18" rx="2" fill="url(#blog-accent)" opacity="0.8"/>
  <rect x="356" y="112" width="12" height="12" rx="2" fill="url(#blog-accent)" opacity="0.5"/>
  <!-- Chart line -->
  <path d="M320 280 L360 240 L400 260 L440 200 L480 220 L520 180 L560 200" stroke="url(#blog-accent)" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Floating elements -->
  <circle cx="620" cy="120" r="40" fill="#2c2c2c" stroke="url(#blog-accent)" stroke-width="1.5" opacity="0.9"/>
  <circle cx="620" cy="120" r="24" fill="none" stroke="url(#blog-accent)" stroke-width="1"/>
  <rect x="140" y="240" width="80" height="80" rx="12" fill="#2c2c2c" stroke="url(#blog-accent)" stroke-width="1.5" opacity="0.8"/>
  <path d="M160 260 L180 240 L200 260 L220 230" stroke="url(#blog-accent)" stroke-width="1.5" fill="none" opacity="0.7"/>
</svg>
